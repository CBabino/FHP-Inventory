<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FHP Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green:#1a7a4a;--green-light:#e6f4ec;--green-mid:#2d9e63;
  --red:#c0392b;--red-light:#fdecea;
  --amber:#d97706;--amber-light:#fef3c7;
  --bg:#f5f7f5;--surface:#fff;--surface2:#f0f2f0;
  --border:#dde3dd;--text:#1a1f1a;--text2:#4a544a;--text3:#8a948a;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --radius:12px;--radius-sm:8px;
}
[data-theme="dark"]{
  --bg:#0f1410;--surface:#1a1f1a;--surface2:#242924;
  --border:#2e362e;--text:#e8ede8;--text2:#9aaa9a;--text3:#5a6a5a;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
  --shadow-lg:0 8px 32px rgba(0,0,0,.4);
  --green-light:#0d2e1c;--red-light:#2e0f0f;--amber-light:#2e1f00;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 .875rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:.6rem;min-width:0;}
.logo-wrap{width:34px;height:34px;border-radius:9px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--green);flex-shrink:0;cursor:default;}
.logo-wrap img{width:100%;height:100%;object-fit:cover;}
.logo-wrap .logo-icon{color:#fff;font-size:1rem;}
.app-name{font-size:.95rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-right{display:flex;align-items:center;gap:.4rem;flex-shrink:0;}
.badge-live{display:inline-flex;align-items:center;gap:.3rem;font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.18rem .5rem;border-radius:99px;white-space:nowrap;}
.badge-live.online{background:var(--green-light);color:var(--green);}
.badge-live.offline{background:var(--red-light);color:var(--red);}
.badge-live.connecting{background:var(--amber-light);color:var(--amber);}
.badge-live .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.badge-live.connecting .dot{animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.icon-toggle{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:30px;height:30px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;transition:background .15s;}
.icon-toggle:hover{background:var(--border);}
.btn-admin-login{background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;padding:.3rem .65rem;border-radius:7px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-admin-login:hover{background:var(--border);}
.btn-admin-login.active{background:var(--green);color:#fff;border-color:var(--green);}

.admin-bar{background:var(--green);color:#fff;padding:.3rem .875rem;font-size:.75rem;font-weight:500;display:flex;align-items:center;justify-content:space-between;}
.admin-bar button{background:rgba(255,255,255,.2);border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:.7rem;padding:.18rem .6rem;border-radius:6px;cursor:pointer;}
.admin-bar button:hover{background:rgba(255,255,255,.3);}

.main{max-width:1280px;margin:0 auto;padding:.875rem;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:.875rem;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.6rem .75rem;}
.stat-val{font-size:1.5rem;font-weight:600;font-family:'DM Mono',monospace;line-height:1;margin-bottom:.15rem;}
.stat-val.blue{color:#1d6fa4;}.stat-val.green{color:var(--green);}.stat-val.red{color:var(--red);}
.stat-label{font-size:.65rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}

.low-alert{background:var(--red-light);border:1px solid rgba(192,57,43,.2);border-radius:var(--radius);padding:.65rem .875rem;margin-bottom:.875rem;}
.low-alert-title{font-weight:600;color:var(--red);font-size:.82rem;margin-bottom:.3rem;}
.low-alert-item{font-size:.78rem;color:var(--red);opacity:.85;padding:.08rem 0;}

.toolbar{display:flex;align-items:center;gap:.45rem;margin-bottom:.875rem;flex-wrap:wrap;}
.toolbar-left{display:flex;align-items:center;gap:.45rem;flex:1;min-width:0;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:120px;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.42rem .6rem .42rem 1.9rem;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--text);outline:none;transition:border .15s;}
.search-wrap input::placeholder{color:var(--text3);}
.search-wrap input:focus{border-color:var(--green);}
.search-icon{position:absolute;left:.55rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.78rem;pointer-events:none;}
.filter-pills{display:flex;gap:.35rem;flex-wrap:wrap;}
.pill{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:.68rem;font-weight:600;padding:.22rem .55rem;border-radius:99px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.pill:hover{border-color:var(--green);color:var(--green);}
.pill.active{background:var(--green);border-color:var(--green);color:#fff;}
.btn-primary{background:var(--green);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;padding:.42rem .85rem;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;white-space:nowrap;display:flex;align-items:center;gap:.3rem;}
.btn-primary:hover{background:var(--green-mid);}
.btn-secondary{background:var(--surface);color:var(--text2);border:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;padding:.38rem .75rem;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-secondary:hover{background:var(--surface2);}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.6rem;}
@media(min-width:480px){.grid{gap:.75rem;}}
@media(min-width:700px){.grid{grid-template-columns:repeat(3,1fr);gap:.875rem;}}
@media(min-width:1000px){.grid{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1280px){.grid{grid-template-columns:repeat(5,1fr);}}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .2s,opacity .2s;}
.card:hover{box-shadow:var(--shadow-lg);}
.card.dragging{opacity:.4;box-shadow:var(--shadow-lg);cursor:grabbing;}
.card.drag-over{border-color:var(--green);border-style:dashed;}
.card-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;}
.card-img-placeholder{width:100%;aspect-ratio:1/1;background:var(--surface2);display:flex;align-items:center;justify-content:center;}
.card-img-placeholder svg{width:24px;height:24px;color:var(--border);}
.card-body{padding:.55rem .6rem .65rem;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.25rem;gap:.25rem;}
.card-name{font-size:.8rem;font-weight:600;color:var(--text);line-height:1.3;word-break:break-word;}
.card-actions{display:flex;gap:.1rem;flex-shrink:0;}
.icon-btn{background:none;border:none;cursor:pointer;padding:.18rem;border-radius:5px;color:var(--text3);transition:all .15s;font-size:.75rem;line-height:1;}
.icon-btn:hover{background:var(--surface2);}
.icon-btn.edit:hover{color:#1d6fa4;}
.icon-btn.del:hover{color:var(--red);}
.drag-handle{cursor:grab;touch-action:none;}
.drag-handle:active{cursor:grabbing;}
.cat-tag{display:inline-block;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:.12rem .45rem;border-radius:99px;margin-bottom:.45rem;}
.qty-area{margin-bottom:.45rem;}
.qty-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.3rem;gap:.2rem;}
.qty-val{font-size:1.1rem;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);line-height:1;}
.qty-unit{font-size:.65rem;font-weight:400;color:var(--text3);margin-left:.1rem;}
.low-badge{background:var(--red);color:#fff;font-size:.55rem;font-weight:700;text-transform:uppercase;padding:.1rem .35rem;border-radius:99px;flex-shrink:0;}
.qty-btns{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;}
.qty-btn{border:none;border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:.88rem;font-weight:700;padding:.38rem .3rem;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;}
.qty-btn.dec{background:var(--red-light);color:var(--red);}
.qty-btn.inc{background:var(--green-light);color:var(--green);}
.card-notes{font-size:.68rem;color:var(--text3);border-top:1px solid var(--border);padding-top:.38rem;margin-top:.3rem;font-style:italic;line-height:1.4;}
.card-date{font-size:.6rem;color:var(--text3);margin-top:.25rem;font-family:'DM Mono',monospace;}

.empty{text-align:center;padding:3rem 1rem;}
.empty-icon{font-size:2.5rem;margin-bottom:.5rem;opacity:.25;}
.empty-title{font-size:.95rem;font-weight:600;color:var(--text3);margin-bottom:.2rem;}
.empty-sub{font-size:.8rem;color:var(--text3);}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
@media(min-width:600px){.overlay{align-items:center;padding:1rem;}}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:500px;max-height:93vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
@media(min-width:600px){.modal{border-radius:var(--radius);}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:.9rem 1.1rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1;}
.modal-title{font-size:.95rem;font-weight:600;}
.modal-close{background:none;border:none;font-size:1.05rem;cursor:pointer;color:var(--text3);padding:.25rem;border-radius:6px;}
.modal-close:hover{background:var(--surface2);}
.modal-body{padding:1.1rem;}
.modal-foot{display:flex;gap:.55rem;padding:.9rem 1.1rem;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface);}
.modal-foot .btn-primary,.modal-foot .btn-secondary{flex:1;justify-content:center;}
.form-group{margin-bottom:.85rem;}
.form-label{display:block;font-size:.7rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.28rem;}
.form-input,.form-select,.form-textarea{width:100%;padding:.48rem .72rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border .15s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--green);}
.form-select option{background:var(--surface);color:var(--text);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}

/* IMAGE TOOL */
.img-tool-wrap{margin-top:.6rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.7rem;}
.img-tool-label{font-size:.72rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.5rem;}
.img-canvas-wrap{background:#000;border-radius:6px;overflow:hidden;margin-bottom:.6rem;cursor:crosshair;user-select:none;touch-action:none;line-height:0;}
.img-canvas-wrap canvas{display:block;width:100%;height:auto;}
.img-tool-controls{display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;}
.img-tool-controls label{font-size:.72rem;color:var(--text2);font-weight:500;white-space:nowrap;}
.range-input{flex:1;min-width:70px;accent-color:var(--green);cursor:pointer;}
.img-preview-thumb{width:100%;max-height:110px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);margin-top:.5rem;display:none;}
.img-status{font-size:.72rem;color:var(--text3);margin-top:.35rem;font-style:italic;}

.admin-modal{max-width:320px;}
.pin-input{text-align:center;font-size:1.4rem;font-family:'DM Mono',monospace;letter-spacing:.3em;}
.pin-error{color:var(--red);font-size:.8rem;text-align:center;margin-top:.45rem;}
.cat-list{display:flex;flex-direction:column;gap:.38rem;margin-bottom:.9rem;}
.cat-row{display:flex;align-items:center;justify-content:space-between;padding:.45rem .65rem;background:var(--surface2);border-radius:var(--radius-sm);}
.cat-row-name{font-size:.83rem;font-weight:500;display:flex;align-items:center;gap:.4rem;}
.cat-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-add-row{display:flex;gap:.45rem;}
.cat-add-row input{flex:1;}

.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.7rem;z-index:9999;}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%) translateY(8px);background:var(--text);color:var(--bg);padding:.5rem 1rem;border-radius:var(--radius-sm);font-size:.8rem;font-weight:500;z-index:9999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="spinner"></div>
  <span style="font-size:.82rem;color:var(--text3)">Connecting…</span>
</div>

<div class="admin-bar" id="adminBar" style="display:none">
  <span>🔐 Admin mode</span>
  <button onclick="adminLogout()">Log out</button>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-wrap" id="logoWrap"><span class="logo-icon">📦</span></div>
    <span class="app-name">FHP Inventory</span>
  </div>
  <div class="topbar-right">
    <span class="badge-live connecting" id="connBadge"><span class="dot"></span><span id="connText">…</span></span>
    <button class="icon-toggle" id="darkToggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
    <button class="btn-admin-login" id="adminLoginBtn" onclick="openAdminLogin()">Admin</button>
  </div>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat"><div class="stat-val blue" id="statTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat"><div class="stat-val green" id="statInStock">0</div><div class="stat-label">In Stock</div></div>
    <div class="stat"><div class="stat-val red" id="statLow">0</div><div class="stat-label">Low Stock</div></div>
  </div>
  <div class="low-alert" id="lowAlert" style="display:none">
    <div class="low-alert-title">⚠️ Low Stock Alert</div>
    <div id="lowAlertItems"></div>
  </div>
  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search…" oninput="renderProducts()">
      </div>
      <div class="filter-pills" id="filterPills"></div>
    </div>
    <button class="btn-primary" id="addProductBtn" style="display:none" onclick="openProductModal()">+ Add</button>
    <button class="btn-secondary" id="manageCatsBtn" style="display:none" onclick="openCatManager()">⚙ Cats</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" style="display:none">
    <div class="empty-icon">📦</div>
    <div class="empty-title">No products found</div>
    <div class="empty-sub" id="emptySubText">Ask an admin to add products</div>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div class="overlay" id="adminLoginOverlay">
  <div class="modal admin-modal">
    <div class="modal-head"><span class="modal-title">Admin Login</span><button class="modal-close" onclick="closeOverlay('adminLoginOverlay')">✕</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">PIN</label>
        <input type="password" id="pinInput" class="form-input pin-input" maxlength="10" placeholder="••••" onkeydown="if(event.key==='Enter')checkPin()">
      </div>
      <div class="pin-error" id="pinError" style="display:none">Incorrect PIN.</div>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary" onclick="closeOverlay('adminLoginOverlay')">Cancel</button>
      <button class="btn-primary" onclick="checkPin()">Login</button>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="overlay" id="productOverlay">
  <div class="modal">
    <div class="modal-head"><span class="modal-title" id="productModalTitle">Add Product</span><button class="modal-close" onclick="closeOverlay('productOverlay')">✕</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Product Name *</label>
        <input type="text" id="fName" class="form-input" placeholder="e.g. Termite Spray">
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select id="fCategory" class="form-select"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Quantity *</label>
          <input type="number" id="fQty" class="form-input" step="0.1" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Unit</label>
          <select id="fUnit" class="form-select">
            <option value="gallons">Gallons</option>
            <option value="liters">Liters</option>
            <option value="pounds">Pounds</option>
            <option value="kg">Kilograms</option>
            <option value="units">Units</option>
            <option value="boxes">Boxes</option>
            <option value="bottles">Bottles</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Reorder Level</label>
        <input type="number" id="fReorder" class="form-input" step="0.1" min="0" placeholder="Alert below this">
      </div>
      <div class="form-group">
        <label class="form-label">Product Image</label>
        <input type="file" id="fImage" class="form-input" accept="image/*" onchange="handleImagePick(this)">
        <!-- Crop/resize tool -->
        <div class="img-tool-wrap" id="imgToolWrap" style="display:none">
          <div class="img-tool-label">✂️ Adjust &amp; crop — drag to reposition, zoom to fit</div>
          <div class="img-canvas-wrap" id="imgCanvasWrap">
            <canvas id="imgCanvas"></canvas>
          </div>
          <div class="img-tool-controls">
            <label>Zoom</label>
            <input type="range" class="range-input" id="imgZoom" min="0.1" max="5" step="0.01" value="1" oninput="drawCrop()">
            <button type="button" class="btn-secondary" style="font-size:.72rem;padding:.28rem .55rem" onclick="resetCrop()">Reset</button>
            <button type="button" class="btn-primary" style="font-size:.72rem;padding:.28rem .55rem" onclick="applyCrop()">✓ Use this</button>
          </div>
        </div>
        <img id="fImagePreview" class="img-preview-thumb">
        <div class="img-status" id="imgStatus"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="fNotes" class="form-textarea" rows="2" placeholder="Storage location, tips…"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-secondary" onclick="closeOverlay('productOverlay')">Cancel</button>
      <button class="btn-primary" id="productSubmitBtn" onclick="submitProduct()">Add Product</button>
    </div>
  </div>
</div>

<!-- CATEGORY MANAGER -->
<div class="overlay" id="catOverlay">
  <div class="modal">
    <div class="modal-head"><span class="modal-title">Categories</span><button class="modal-close" onclick="closeOverlay('catOverlay')">✕</button></div>
    <div class="modal-body">
      <div class="cat-list" id="catList"></div>
      <div class="cat-add-row">
        <input type="text" id="newCatInput" class="form-input" placeholder="New category…" onkeydown="if(event.key==='Enter')addCategory()">
        <button class="btn-primary" onclick="addCategory()">Add</button>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-primary" style="flex:1;justify-content:center" onclick="closeOverlay('catOverlay')">Done</button>
    </div>
  </div>
</div>

<input type="file" id="logoUploadInput" accept="image/*" style="display:none" onchange="uploadLogo(this)">
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, remove, push, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCYeaG_mKBmJT-rr23unS-y6rcF7ve8kKA",
  authDomain: "fhp-inventory.firebaseapp.com",
  databaseURL: "https://fhp-inventory-default-rtdb.firebaseio.com",
  projectId: "fhp-inventory",
  storageBucket: "fhp-inventory.firebasestorage.app",
  messagingSenderId: "582106300773",
  appId: "1:582106300773:web:6446252c85fdd9380e218c"
};

// ---- IMAGE COMPRESSION UTILITY ----
// Returns a promise resolving to a compressed base64 jpeg string
function compressFile(file, maxW, maxH, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = e => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
        const w = Math.max(1, Math.round(img.naturalWidth * scale));
        const h = Math.max(1, Math.round(img.naturalHeight * scale));
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function compressDataUrl(dataUrl, maxW, maxH, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onerror = reject;
    img.onload = () => {
      const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
      const w = Math.max(1, Math.round(img.naturalWidth * scale));
      const h = Math.max(1, Math.round(img.naturalHeight * scale));
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', quality));
    };
    img.src = dataUrl;
  });
}

// ---- IMAGE PICK & CROP ----
let cropImg = null, cropOffX = 0, cropOffY = 0, cropZoom = 1;
let dragStart = null, dragOff = null;

window.handleImagePick = function(inp) {
  const f = inp.files[0]; if (!f) return;
  setImgStatus('Loading…');
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      cropImg = img;
      const canvas = document.getElementById('imgCanvas');
      const wrap = document.getElementById('imgCanvasWrap');
      // Use square output
      canvas.width = IMG_SIZE; canvas.height = IMG_SIZE;
      const dispW = wrap.getBoundingClientRect().width || 280;
      canvas.style.height = dispW + 'px';
      const scale = Math.max(IMG_SIZE / img.naturalWidth, IMG_SIZE / img.naturalHeight);
      cropZoom = scale;
      document.getElementById('imgZoom').min = (scale * 0.3).toFixed(3);
      document.getElementById('imgZoom').max = (scale * 6).toFixed(3);
      document.getElementById('imgZoom').value = scale;
      cropOffX = (IMG_SIZE - img.naturalWidth * scale) / 2;
      cropOffY = (IMG_SIZE - img.naturalHeight * scale) / 2;
      drawCrop();
      document.getElementById('imgToolWrap').style.display = 'block';
      document.getElementById('fImagePreview').style.display = 'none';
      pendingImageDataUrl = null;
      setImgStatus('Drag to reposition, zoom to fit, then tap "✓ Use this"');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(f);
};

window.drawCrop = function() {
  if (!cropImg) return;
  cropZoom = parseFloat(document.getElementById('imgZoom').value);
  const canvas = document.getElementById('imgCanvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, IMG_SIZE, IMG_SIZE);
  ctx.drawImage(cropImg, cropOffX, cropOffY, cropImg.naturalWidth * cropZoom, cropImg.naturalHeight * cropZoom);
};

window.resetCrop = function() {
  if (!cropImg) return;
  const scale = Math.max(IMG_SIZE / cropImg.naturalWidth, IMG_SIZE / cropImg.naturalHeight);
  cropZoom = scale;
  document.getElementById('imgZoom').value = scale;
  cropOffX = (IMG_SIZE - cropImg.naturalWidth * scale) / 2;
  cropOffY = (IMG_SIZE - cropImg.naturalHeight * scale) / 2;
  drawCrop();
};

window.applyCrop = function() {
  if (!cropImg) return;
  const canvas = document.getElementById('imgCanvas');
  // Export from crop canvas — already IMG_SIZE x IMG_SIZE
  const raw = canvas.toDataURL('image/jpeg', 0.85);
  pendingImageDataUrl = raw;
  const prev = document.getElementById('fImagePreview');
  prev.src = raw; prev.style.display = 'block';
  document.getElementById('imgToolWrap').style.display = 'none';
  setImgStatus('✅ Image ready — will be saved when you submit');
};

function setImgStatus(msg) {
  document.getElementById('imgStatus').textContent = msg;
}

// Drag to pan
const canvasWrap = document.getElementById('imgCanvasWrap');
function getPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}
canvasWrap.addEventListener('mousedown', e => { dragStart = getPos(e); dragOff = { x: cropOffX, y: cropOffY }; e.preventDefault(); });
canvasWrap.addEventListener('touchstart', e => { dragStart = getPos(e); dragOff = { x: cropOffX, y: cropOffY }; }, { passive:true });
function onMove(e) {
  if (!dragStart) return;
  const rect = document.getElementById('imgCanvas').getBoundingClientRect();
  const scale = IMG_SIZE / rect.width;
  const p = getPos(e);
  cropOffX = dragOff.x + (p.x - dragStart.x) * scale;
  cropOffY = dragOff.y + (p.y - dragStart.y) * scale;
  drawCrop();
}
window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, { passive:true });
window.addEventListener('mouseup', () => { dragStart = null; });
window.addEventListener('touchend', () => { dragStart = null; });

// ---- CATEGORIES ----
function getCatColor(id) {
  const c = categories[id];
  if (c && c.color) return c.color;
  return CAT_COLORS[Object.keys(categories).indexOf(id) % CAT_COLORS.length] || '#888';
}
function renderFilterPills() {
  let html = '<button class="pill' + (activeFilter==='all'?' active':'') + '" onclick="setFilter(\'all\')">All</button>';
  Object.entries(categories).forEach(([id, cat]) => {
    const col = getCatColor(id);
    const sel = activeFilter === id;
    html += '<button class="pill' + (sel?' active':'') + '" onclick="setFilter(\'' + id + '\')" style="' + (sel ? 'background:'+col+';border-color:'+col+';' : 'border-color:'+col+';color:'+col+';') + '">' + cat.name + '</button>';
  });
  document.getElementById('filterPills').innerHTML = html;
}
window.setFilter = function(id) { activeFilter = id; renderFilterPills(); renderProducts(); };
function populateCategorySelect() {
  const sel = document.getElementById('fCategory');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— No category —</option>';
  Object.entries(categories).forEach(([id, cat]) => { sel.innerHTML += '<option value="' + id + '">' + cat.name + '</option>'; });
  if (prev) sel.value = prev;
}
function renderCatList() {
  const list = document.getElementById('catList');
  const ents = Object.entries(categories);
  if (!ents.length) { list.innerHTML = '<div style="font-size:.8rem;color:var(--text3)">No categories yet.</div>'; return; }
  list.innerHTML = ents.map(([id, cat]) => {
    const col = getCatColor(id);
    return '<div class="cat-row"><div class="cat-row-name"><span class="cat-color-dot" style="background:' + col + '"></span>' + cat.name + '</div><button class="icon-btn del" onclick="deleteCategory(\'' + id + '\')">🗑️</button></div>';
  }).join('');
}
window.openCatManager = function() { renderCatList(); document.getElementById('catOverlay').classList.add('open'); };
window.addCategory = async function() {
  const inp = document.getElementById('newCatInput');
  const name = inp.value.trim(); if (!name) return;
  await push(ref(db,'categories'), { name, color: CAT_COLORS[Object.keys(categories).length % CAT_COLORS.length] });
  inp.value = ''; showToast('✅ Category added');
};
window.deleteCategory = async function(id) {
  if (!confirm('Delete this category?')) return;
  await remove(ref(db,'categories/'+id));
  const updates = {};
  Object.entries(products).forEach(([pid, p]) => { if (p.categoryId === id) updates['products/'+pid+'/categoryId'] = null; });
  if (Object.keys(updates).length) await update(ref(db), updates);
  showToast('🗑️ Category deleted');
};

// ---- DRAG TO REORDER ----
let dragSrcId = null;

function addDragListeners(el, id) {
  // Desktop
  el.addEventListener('dragstart', e => {
    dragSrcId = id;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => { el.classList.remove('dragging'); document.querySelectorAll('.card').forEach(c => c.classList.remove('drag-over')); });
  el.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (dragSrcId !== id) el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (dragSrcId && dragSrcId !== id) swapOrder(dragSrcId, id);
  });
}

async function swapOrder(idA, idB) {
  const a = products[idA], b = products[idB];
  if (!a || !b) return;
  const orderA = a.order ?? 0, orderB = b.order ?? 0;
  await update(ref(db,'products/'+idA), { order: orderB });
  await update(ref(db,'products/'+idB), { order: orderA });
}

// ---- RENDER PRODUCTS ----
window.renderProducts = function() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const search = document.getElementById('searchInput').value.toLowerCase();
  let arr = Object.entries(products).map(([id,p]) => ({...p,id}));
  if (activeFilter !== 'all') arr = arr.filter(p => p.categoryId === activeFilter);
  if (search) arr = arr.filter(p => (p.name||'').toLowerCase().includes(search) || (p.notes||'').toLowerCase().includes(search));
  // Sort by order field, fall back to name
  arr.sort((a,b) => (a.order??9999) - (b.order??9999) || (a.name||'').localeCompare(b.name||''));

  const all = Object.values(products);
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statInStock').textContent = all.filter(p => p.quantity > (p.reorderLevel||0)).length;
  const low = all.filter(p => p.quantity <= (p.reorderLevel||0));
  document.getElementById('statLow').textContent = low.length;
  const alertBox = document.getElementById('lowAlert');
  if (low.length) {
    alertBox.style.display = 'block';
    document.getElementById('lowAlertItems').innerHTML = low.map(p => '<div class="low-alert-item">• ' + p.name + ' — ' + p.quantity + ' ' + p.unit + '</div>').join('');
  } else alertBox.style.display = 'none';

  if (!arr.length) {
    grid.innerHTML = ''; empty.style.display = 'block';
    document.getElementById('emptySubText').textContent = isAdmin ? 'Click "+ Add" to get started' : 'No products found';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = arr.map(p => {
    const cat = p.categoryId && categories[p.categoryId];
    const col = p.categoryId ? getCatColor(p.categoryId) : null;
    const isLow = p.quantity <= (p.reorderLevel||0);
    // Images stored under /images/{productId}
    const imgSrc = images[p.id] || null;
    const imgHtml = imgSrc
      ? '<img class="card-img" src="' + imgSrc + '" alt="' + p.name + '">'
      : '<div class="card-img-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
    const dragHandle = isAdmin ? '<span class="icon-btn drag-handle" title="Drag to reorder">⠿</span>' : '';
    const adminActs = isAdmin
      ? dragHandle + '<button class="icon-btn edit" onclick="editProduct(\'' + p.id + '\')">✏️</button><button class="icon-btn del" onclick="deleteProduct(\'' + p.id + '\')">🗑️</button>'
      : '';
    const catBadge = cat ? '<div class="cat-tag" style="background:' + col + '22;color:' + col + '">' + cat.name + '</div>' : '';
    return '<div class="card" id="card-' + p.id + '" draggable="' + (isAdmin ? 'true' : 'false') + '">' + imgHtml +
      '<div class="card-body">' +
        '<div class="card-header"><span class="card-name">' + p.name + '</span><div class="card-actions">' + adminActs + '</div></div>' +
        catBadge +
        '<div class="qty-area"><div class="qty-row"><span class="qty-val">' + p.quantity + '<span class="qty-unit">' + p.unit + '</span></span>' + (isLow ? '<span class="low-badge">LOW</span>' : '') + '</div>' +
        '<div class="qty-btns"><button class="qty-btn dec" onclick="adjustQty(\'' + p.id + '\',-1)">−1</button><button class="qty-btn inc" onclick="adjustQty(\'' + p.id + '\',1)">+1</button></div></div>' +
        (p.notes ? '<div class="card-notes">' + p.notes + '</div>' : '') +
        '<div class="card-date">' + (p.lastUpdated ? new Date(p.lastUpdated).toLocaleDateString() : '—') + '</div>' +
      '</div></div>';
  }).join('');

  // Attach drag listeners to each card (admin only)
  if (isAdmin) {
    arr.forEach(p => {
      const el = document.getElementById('card-' + p.id);
      if (el) addDragListeners(el, p.id);
    });
  }
};

window.adjustQty = async function(id, delta) {
  const p = products[id]; if (!p) return;
  await update(ref(db,'products/'+id), { quantity: Math.max(0,(p.quantity||0)+delta), lastUpdated: new Date().toISOString() });
};
window.deleteProduct = async function(id) {
  if (!confirm('Delete this product?')) return;
  await remove(ref(db,'products/'+id));
  await remove(ref(db,'images/'+id));
  showToast('🗑️ Product deleted');
};

window.openProductModal = function() {
  editingProductId = null;
  document.getElementById('productModalTitle').textContent = 'Add Product';
  document.getElementById('productSubmitBtn').textContent = 'Add Product';
  ['fName','fQty','fReorder','fNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fUnit').value = 'gallons';
  document.getElementById('fImage').value = '';
  document.getElementById('fImagePreview').style.display = 'none';
  document.getElementById('imgToolWrap').style.display = 'none';
  pendingImageDataUrl = null; cropImg = null;
  setImgStatus('');
  populateCategorySelect();
  document.getElementById('fCategory').value = '';
  document.getElementById('productOverlay').classList.add('open');
};

window.editProduct = function(id) {
  const p = products[id]; if (!p) return;
  editingProductId = id;
  document.getElementById('productModalTitle').textContent = 'Edit Product';
  document.getElementById('productSubmitBtn').textContent = 'Save Changes';
  document.getElementById('fName').value = p.name||'';
  document.getElementById('fQty').value = p.quantity??'';
  document.getElementById('fUnit').value = p.unit||'gallons';
  document.getElementById('fReorder').value = p.reorderLevel??'';
  document.getElementById('fNotes').value = p.notes||'';
  document.getElementById('fImage').value = '';
  document.getElementById('imgToolWrap').style.display = 'none';
  pendingImageDataUrl = null; cropImg = null;
  populateCategorySelect();
  document.getElementById('fCategory').value = p.categoryId||'';
  const prev = document.getElementById('fImagePreview');
  const existing = images[id];
  if (existing) { prev.src = existing; prev.style.display = 'block'; setImgStatus('Existing image — upload a new one to replace it'); }
  else { prev.style.display = 'none'; setImgStatus(''); }
  document.getElementById('productOverlay').classList.add('open');
};

window.submitProduct = async function() {
  const name = document.getElementById('fName').value.trim();
  const qty = parseFloat(document.getElementById('fQty').value);
  if (!name || isNaN(qty)) { alert('Please enter a name and quantity.'); return; }

  // Block if image tool is open but not applied
  if (document.getElementById('imgToolWrap').style.display !== 'none') {
    showToast('⚠️ Tap "✓ Use this" to apply the image first');
    return;
  }

  const btn = document.getElementById('productSubmitBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  try {
    const product = {
      name,
      categoryId: document.getElementById('fCategory').value||null,
      quantity: qty,
      unit: document.getElementById('fUnit').value,
      reorderLevel: parseFloat(document.getElementById('fReorder').value)||0,
      notes: document.getElementById('fNotes').value,
      lastUpdated: new Date().toISOString(),
      order: editingProductId ? (products[editingProductId]?.order ?? Date.now()) : Date.now()
    };

    let productId = editingProductId;
    if (editingProductId) {
      await set(ref(db,'products/'+editingProductId), product);
    } else {
      const newRef = await push(ref(db,'products'), product);
      productId = newRef.key;
    }

    // Save image separately under /images/{productId}
    if (pendingImageDataUrl) {
      await set(ref(db,'images/'+productId), pendingImageDataUrl);
      showToast('✅ ' + (editingProductId ? 'Updated' : 'Product added'));
    } else if (!editingProductId) {
      // No image for new product — that's fine
      showToast('✅ Product added');
    } else {
      showToast('✅ Updated');
    }

    closeOverlay('productOverlay');
  } catch(err) {
    console.error('Save error:', err);
    showToast('❌ Save failed: ' + (err.message || 'unknown error'));
  }
  btn.disabled = false;
  btn.textContent = editingProductId ? 'Save Changes' : 'Add Product';
};

window.closeOverlay = function(id) { document.getElementById(id).classList.remove('open'); };
window.showToast = function(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
};
function showToast(msg) { window.showToast(msg); }
document.querySelectorAll('.overlay').forEach(ov => ov.addEventListener('click', e => { if (e.target===ov) ov.classList.remove('open'); }));
</script>
